<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Gestor Multimedia</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body>
  <div class="tabs">
    <a href="#principal" class="tab">Home</a>
    <a href="#peliculas" class="tab">Películas</a>
    <a href="#series" class="tab">Series</a>
    <a href="#libros" class="tab">Libros</a>
    <a href="#formulario" class="add-btn">Agregar</a>
  </div>

  <div class="content">
    <div id="principal" class="panel">
      <h2>Todos los registros</h2>
      <table>
        <thead>
          <tr><th>Título</th><th>Tipo</th><th>Año</th><th>Estado</th><th>Calificación</th><th>Persona</th><th>Comentario</th></tr>
        </thead>
        <tbody>
          <tr th:each="item : ${Todos}">
            <td th:text="${item.titulo}"></td>
            <td th:text="${item.tipo}"></td>
            <td th:text="${item.anio}"></td>
            <td th:text="${item.estado}"></td>
            <td th:text="${item.calificacion}"></td>
            <td th:text="${item.vistoPor}"></td>
            <td th:text="${item.comentario}"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="peliculas" class="panel">
      <h2>Películas</h2>
      <table>
        <thead>
          <tr><th>Título</th><th>Año</th><th>Estado</th><th>Calificación</th><th>Persona</th><th>Comentario</th></tr>
        </thead>
        <tbody>
          <tr th:each="item : ${Peliculas}">
             <td th:text="${item.titulo}"></td><td th:text="${item.anio}"></td><td th:text="${item.estado}"></td>
             <td th:text="${item.calificacion}"></td><td th:text="${item.vistoPor}"></td><td th:text="${item.comentario}"></td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <div id="series" class="panel">
      <h2>Series</h2>
      <table>
        <thead>
          <tr><th>Título</th><th>Año</th><th>Estado</th><th>Calificación</th><th>Persona</th><th>Comentario</th></tr>
        </thead>
        <tbody>
          <tr th:each="item : ${Series}">
             <td th:text="${item.titulo}"></td><td th:text="${item.anio}"></td><td th:text="${item.estado}"></td>
             <td th:text="${item.calificacion}"></td><td th:text="${item.vistoPor}"></td><td th:text="${item.comentario}"></td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <div id="libros" class="panel">
      <h2>Libros</h2>
      <table>
        <thead>
          <tr><th>Título</th><th>Año</th><th>Estado</th><th>Calificación</th><th>Persona</th><th>Comentario</th></tr>
        </thead>
        <tbody>
          <tr th:each="item : ${Libros}">
             <td th:text="${item.titulo}"></td><td th:text="${item.anio}"></td><td th:text="${item.estado}"></td>
             <td th:text="${item.calificacion}"></td><td th:text="${item.vistoPor}"></td><td th:text="${item.comentario}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="formulario" class="form-section">
    <h2>Agregar Registro</h2>
    <form th:action="@{/guardar}" th:object="${nuevoRegistro}" method="post">
      <label>Título: <input type="text" th:field="*{titulo}"></label>
      <label>Tipo:
        <select th:field="*{tipo}">
          <option value="Película">Película</option>
          <option value="Serie">Serie</option>
          <option value="Libro">Libro</option>
        </select>
      </label>
      <label>Año: <input type="number" th:field="*{anio}"></label>
      <label>Estado:
        <select th:field="*{estado}">
          <option value="Por ver/leer">Por ver/leer</option>
          <option value="En curso">En curso</option>
          <option value="Visto/Leído">Visto/Leído</option>
        </select>
      </label>
      <label>Calificación:
        <select th:field="*{calificacion}">
          <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
        </select>
      </label>
      <label>Visto/Leído por: <input type="text" th:field="*{vistoPor}"></label>
      <label>Reseña/Comentario:
        <textarea th:field="*{comentario}"></textarea>
      </label>
      <button type="submit">Guardar</button>
    </form>
  </div>
</body>
</html>
